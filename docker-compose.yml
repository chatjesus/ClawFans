version: "3.9"

# ClawFans — one-command local development stack
#
# Usage:
#   docker compose up          # start all services
#   docker compose up -d       # start in background
#   docker compose logs -f     # tail logs
#   docker compose down        # stop
#
# Prerequisites:
#   - Docker Desktop (or Docker + Docker Compose)
#   - Copy backend/.env.example → backend/.env and fill in values
#   - Copy frontend/.env.local.example → frontend/.env.local and fill in values

services:

  # ── Ollama LLM ──────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: clawfans-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Uncomment for GPU support (NVIDIA):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Backend (FastAPI) ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clawfans-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - DATABASE_URL=sqlite:////app/data/clawfans.db
    volumes:
      # Persist database and local uploads
      - backend_data:/app/data
      - backend_uploads:/app/uploads
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── Frontend (Next.js) ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: clawfans-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env.local
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy

volumes:
  ollama_data:
  backend_data:
  backend_uploads:
